<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MiaoMiaoTrader Stats</title>
    <link rel="stylesheet" href="/static/stats.css" />
  </head>
  <body>
    <div class="container">
      <div class="layout">
        <aside class="sidebar">
          <div class="sidebar-title">配置中心</div>
          <nav class="nav">
            <a class="nav-link" href="/">交易偏好</a>
            <a class="nav-link" href="/llm">LLM 模型</a>
            <a class="nav-link active" href="/stats">运行统计</a>
          </nav>
          <div class="sidebar-foot muted">MiaoMiaoTrader</div>
        </aside>

        <main class="content">
          <div class="header">
            <div>
              <div class="title">运行统计</div>
              <div class="subtitle">查看请求与交易指标</div>
            </div>
          </div>

          <div class="card">
            <div id="tokenRow" class="row">
              <label class="muted">Access Token</label>
              <input id="token" placeholder="启动日志里的 token" />
            </div>
            <div id="tokenHint" class="muted hidden">已自动使用已保存的 Token。</div>
            <button class="btn" onclick="loadStats()">刷新统计</button>
            <div class="stats-grid">
              <div class="stat-item">
                <div class="muted">已请求次数</div>
                <div id="statRequests" class="stat-value">-</div>
              </div>
              <div class="stat-item">
                <div class="muted">交易单数</div>
                <div id="statTrades" class="stat-value">-</div>
              </div>
              <div class="stat-item">
                <div class="muted">浮动盈亏</div>
                <div id="statPnl" class="stat-value">-</div>
              </div>
              <div class="stat-item">
                <div class="muted">当前持仓</div>
                <div id="statPositions" class="stat-value">-</div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="/static/stats.js"></script>
  </body>
</html>

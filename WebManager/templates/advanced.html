<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MiaoMiaoTrader Advanced</title>
    <link rel="stylesheet" href="/static/index.css" />
  </head>
  <body>
    <div id="loginView" class="center">
      <div class="login-card">
        <div class="brand">🐱 MiaoMiaoTrader</div>
        <div class="login-title">管理控制台登录</div>
        <div class="login-desc">输入启动日志中的 Token 后进入管理页面</div>
        <div class="row">
          <label>Access Token</label>
          <input id="token" placeholder="启动日志里看到的 token" />
        </div>
        <div class="btn-row">
          <button class="btn" onclick="login()">登录</button>
        </div>
      </div>
    </div>

    <div id="appView" class="container hidden">
      <div class="layout">
        <aside class="sidebar">
          <div class="sidebar-title">配置中心</div>
          <nav class="nav">
            <a class="nav-link" href="/">交易偏好</a>
            <a class="nav-link" href="/llm">LLM 模型</a>
            <a class="nav-link" href="/stats">运行统计</a>
          </nav>
          <div class="sidebar-foot muted">MiaoMiaoTrader</div>
        </aside>

        <main class="content">
          <div class="header">
            <div>
              <div class="title">高级配置</div>
              <div class="subtitle">端口与原始 JSON 配置</div>
            </div>
            <div class="btn-row">
              <div id="status" class="status muted">就绪</div>
              <button class="btn btn-ghost" onclick="loadConfig()">加载</button>
              <button class="btn" onclick="saveConfig()">保存</button>
              <button class="btn btn-danger" onclick="restartApp()">重启服务</button>
            </div>
          </div>

          <div class="grid">
            <div class="card">
              <div class="card-header">
                <h3>Web 端口</h3>
                <div class="card-subtitle">用于访问管理面板</div>
              </div>
              <div class="row">
                <label>Web 端口</label>
                <input id="webPort" type="number" min="1" max="65535" />
              </div>
            </div>

            <div class="card">
              <div class="card-header">
                <h3>原始配置</h3>
                <div class="card-subtitle">高级编辑：直接修改 JSON</div>
              </div>
              <textarea id="configRaw" class="code"></textarea>
              <div class="muted">可在此直接编辑 JSON。保存时会优先使用当前表单数据。</div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="/static/index.js"></script>
  </body>
</html>

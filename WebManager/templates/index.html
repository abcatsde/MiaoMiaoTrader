<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MiaoMiaoTrader Manager</title>
    <link rel="stylesheet" href="/static/index.css" />
  </head>
  <body>
    <div id="loginView" class="center">
      <div class="login-card">
        <div class="login-title">MiaoMiaoTrader 登录</div>
        <div class="login-desc">输入启动日志中的 Token 后进入管理页面</div>
        <div class="row">
          <label>Access Token</label>
          <input id="token" placeholder="启动日志里看到的 token" />
        </div>
        <div class="btn-row">
          <button class="btn" onclick="login()">登录</button>
        </div>
      </div>
    </div>

    <div id="appView" class="container hidden">
      <div class="header">
        <div class="title">MiaoMiaoTrader Manager</div>
        <div class="btn-row">
          <button class="btn btn-ghost" onclick="loadConfig()">加载</button>
          <button class="btn" onclick="saveConfig()">保存</button>
          <button class="btn btn-danger" onclick="restartApp()">重启服务</button>
          <a class="btn btn-ghost" href="/stats">统计页面</a>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <h3>Web 端口</h3>
          <div class="row">
            <label>Web 端口</label>
            <input id="webPort" type="number" min="1" max="65535" />
          </div>

          <h3>LLM 模型列表</h3>
          <div class="row btn-row">
            <button class="btn" onclick="openProviderModal()">添加 LLM 模型</button>
            <button class="btn btn-ghost" onclick="addEmptyProvider()">添加空白</button>
          </div>
          <div class="llm-list" id="llmList"></div>
          <div class="footer">拖动左侧图标调整优先级（靠前优先）。</div>
        </div>

        <div class="card">
          <h3>交易偏好</h3>
          <div class="split">
            <div class="row">
              <label>时间级别</label>
              <input id="prefTimeframe" placeholder="15m" />
            </div>
            <div class="row">
              <label>最大币对数</label>
              <input id="prefMaxPairs" type="number" min="1" />
            </div>
            <div class="row">
              <label>最大级别数</label>
              <input id="prefMaxTF" type="number" min="1" />
            </div>
            <div class="row">
              <label>默认保证金模式</label>
              <select id="prefMarginMode">
                <option value="isolated">isolated（逐仓）</option>
                <option value="cross">cross（全仓）</option>
              </select>
            </div>
          </div>

          <div class="row">
            <label>交易选项</label>
            <div class="split">
              <div>
                <div class="pill">币种范围</div>
                <label class="check-row"><input type="checkbox" id="optMainstream" /> 主流币</label>
                <label class="check-row"><input type="checkbox" id="optAlt" /> 山寨币</label>
              </div>
              <div>
                <div class="pill">交易周期</div>
                <label class="check-row"><input type="checkbox" id="optScalp" /> 短线</label>
                <label class="check-row"><input type="checkbox" id="optIntraday" /> 日内</label>
                <label class="check-row"><input type="checkbox" id="optSwing" /> 中长线</label>
              </div>
              <div>
                <div class="pill">交易市场</div>
                <label class="check-row"><input type="checkbox" id="optSpot" /> 现货</label>
                <label class="check-row"><input type="checkbox" id="optDeriv" /> 合约</label>
              </div>
            </div>
          </div>

          <h3>OKX 配置</h3>
          <div class="row">
            <label>Base URL</label>
            <input id="okxBaseUrl" placeholder="https://www.okx.com" />
          </div>
          <div class="row">
            <label>交易模式</label>
            <select id="okxTradeMode">
              <option value="real">实盘</option>
              <option value="demo">模拟盘</option>
            </select>
          </div>
          <div class="row">
            <label>API Key</label>
            <input id="okxKey" placeholder="" />
          </div>
          <div class="row">
            <label>API Secret</label>
            <input id="okxSecret" placeholder="" />
          </div>
          <div class="row">
            <label>Passphrase</label>
            <input id="okxPass" placeholder="" />
          </div>
          <div class="row">
            <label class="check-row"><input type="checkbox" id="okxWeEnabled" /> 启用 WebSocket（we_enabled）</label>
          </div>

          <h3>原始配置</h3>
          <textarea id="configRaw"></textarea>
          <div class="muted">可在此直接编辑 JSON。保存时会优先使用当前表单数据。</div>
        </div>
      </div>
    </div>

    <div id="providerModal" class="modal-backdrop hidden">
      <div class="modal">
        <h3>添加 LLM 模型</h3>
        <div class="modal-steps">
          <div class="modal-step">
            <label>第 1 层：模型名称</label>
            <input id="providerName" placeholder="openai" />
          </div>
          <div class="modal-step">
            <label>第 2 层：API Key</label>
            <input id="providerKey" placeholder="sk-..." />
          </div>
          <div class="modal-step">
            <label>第 3 层：API 地址</label>
            <input id="providerEndpoint" placeholder="https://api.openai.com/v1" />
          </div>
          <div class="modal-step">
            <label>模型</label>
            <input id="providerModel" placeholder="gpt-4o-mini" />
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeProviderModal()">取消</button>
          <button class="btn" onclick="saveProviderFromModal()">保存</button>
        </div>
      </div>
    </div>

    <script src="/static/index.js"></script>
  </body>
</html>
